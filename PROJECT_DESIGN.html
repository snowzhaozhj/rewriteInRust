<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rust 迁移验证工作台 - 项目设计文档 v0.8</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#f0883e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:32px 0}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:24px 0}
.metric{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.metric .v{font-size:1.8em;font-weight:700;color:var(--accent)}
.metric .l{font-size:.78em;color:var(--text2);margin-top:4px}
.content{padding:40px 0}
.content h1{font-size:2em;border-bottom:2px solid var(--accent);padding-bottom:12px;margin:32px 0 16px}
.content h2{font-size:1.5em;color:var(--accent);margin:40px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.content h3{font-size:1.2em;color:var(--purple);margin:24px 0 8px}
.content h4{font-size:1em;color:var(--orange);margin:16px 0 6px}
.content p{margin-bottom:12px}
.content strong{color:#f0f6fc}
.content a{color:var(--accent);text-decoration:none}
.content a:hover{text-decoration:underline}
.content ul,.content ol{padding-left:24px;margin-bottom:12px}
.content li{margin-bottom:4px}
.content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.9em}
.content th{background:var(--surface);color:var(--accent);text-align:left;padding:10px 12px;border:1px solid var(--border);font-weight:600}
.content td{padding:8px 12px;border:1px solid var(--border);vertical-align:top}
.content tr:nth-child(even){background:rgba(22,27,34,.5)}
.content code{background:var(--surface);padding:2px 6px;border-radius:4px;font-size:.85em;font-family:'SF Mono','Fira Code',monospace;color:var(--orange)}
.content pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;margin:16px 0;font-size:.82em;line-height:1.5}
.content pre code{background:none;padding:0;color:var(--text)}
.content blockquote{border-left:4px solid var(--accent);padding:8px 16px;margin:16px 0;background:rgba(88,166,255,.05);color:var(--text2)}
.footer{text-align:center;color:var(--text2);font-size:.82em;padding:40px 0;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:768px){body{font-size:14px}.metrics{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="header">
<div class="container">
<h1 style="font-size:2.2em;border:none;margin:0;padding:0">Rust 迁移验证工作台</h1>
<p style="color:var(--text2);margin-top:8px">项目设计文档 v0.8 | 2026-06-06 | 3 路独立审查后修订</p>
<div class="metrics">
<div class="metric"><div class="v">18</div><div class="l">调研路线</div></div>
<div class="metric"><div class="v">103</div><div class="l">deep research agents</div></div>
<div class="metric"><div class="v">60+</div><div class="l">评估工具</div></div>
<div class="metric"><div class="v">6</div><div class="l">核心论文</div></div>
<div class="metric"><div class="v">8</div><div class="l">迭代轮数</div></div>
<div class="metric"><div class="v">9/10</div><div class="l">最终评分</div></div>
</div>
</div>
</div>
<div class="container content" id="content">
<p style="color:var(--text2)">正在加载文档...</p>
</div>
<div class="footer">
<div class="container">
迭代历程：v0.1（初版）→ v0.2（全面重写）→ v0.3-v0.6（4轮审查修复）→ v0.7（Codex审查+8路补充调研）→ v0.8（3路独立审查修订）<br>
基于 18 路调研、103 个 deep research agents、60+ 工具评估、7 轮审查反馈迭代<br>
rewriteInRust Project &copy; 2026
</div>
</div>
<script>
fetch('PROJECT_DESIGN.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(() => {
    document.getElementById('content').innerHTML = '<p style="color:var(--red)">无法加载 PROJECT_DESIGN.md，请确保 HTML 和 MD 文件在同一目录下，并通过 HTTP 服务器访问（如 python3 -m http.server）。</p>';
  });
</script>
</body>
</html>
