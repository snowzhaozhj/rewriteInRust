# cargo-deny 配置（schema v2，对齐 cargo-deny 0.16+）。
# 旧版 [advisories].vulnerability/notice、[licenses].unlicensed/copyleft 等 key 已移除：
# - 漏洞、未授权许可证在 v2 下默认即 error，无需显式声明
# - 不在 licenses.allow 列表内的许可证默认拒绝（等价旧 copyleft = "deny"）

[advisories]
version = 2
# yanked 仍可配置严重度；unmaintained 在 v2 取 all/workspace/transitive/none（选检查范围）。
yanked = "warn"
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
