name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 格式 + lint + 编译检查 ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - uses: taiki-e/install-action@just
      - run: just fmt-check
      - run: just lint
      - run: just check

  # ── 测试 ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@nextest
      - run: just test

  # ── 依赖审计 ──
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@just
      - run: just deny

  # ── Shell 脚本 lint ──
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ubuntu-latest 预装 shellcheck，直接使用
      - uses: taiki-e/install-action@just
      - run: just shellcheck

  # ── 覆盖率（门禁 ≥70%，当前仅 warning 不 fail）──
  coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov

      # 运行覆盖率测试（终端 summary）
      - name: 运行覆盖率测试
        run: just cov-summary

      # 从已有 profraw 数据导出 JSON 并检查门禁（不重跑测试）
      - name: 覆盖率门禁检查（≥70%）
        run: |
          cd cli && cargo llvm-cov report --json --output-path cov.json
          TOTAL_LINES=$(jq '.data[0].totals.lines.count' cov.json)
          COVERED_LINES=$(jq '.data[0].totals.lines.covered' cov.json)
          if [ "$TOTAL_LINES" -gt 0 ]; then
            PERCENT=$(echo "scale=2; $COVERED_LINES * 100 / $TOTAL_LINES" | bc)
          else
            PERCENT="0"
          fi
          echo "## 覆盖率报告" >> "$GITHUB_STEP_SUMMARY"
          echo "总行数: $TOTAL_LINES | 覆盖行数: $COVERED_LINES | **覆盖率: ${PERCENT}%**" >> "$GITHUB_STEP_SUMMARY"
          # 门禁：低于 70% 输出 warning（不 fail）
          THRESHOLD=70
          BELOW=$(echo "$PERCENT < $THRESHOLD" | bc)
          if [ "$BELOW" -eq 1 ]; then
            echo "::warning::覆盖率 ${PERCENT}% 低于门禁阈值 ${THRESHOLD}%"
          else
            echo "✓ 覆盖率 ${PERCENT}% 满足门禁阈值 ${THRESHOLD}%"
          fi
